# =============================================================================
# IA Hub — Override Docker Compose pour GLPI local (officiel)
# Usage : docker compose -f docker-compose.yml -f docker-compose.glpi.yml up -d
# =============================================================================
# Version avec l'image officielle glpi/glpi + MySQL.
# Variables d'environnement chargées depuis le .env (via env_file).
# Données persistées dans ./storage/glpi et ./storage/mysql.
# =============================================================================

services:

  # Base de données MySQL pour GLPI
  db:
    image: mysql:latest
    container_name: ia-hub-glpi-db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${GLPI_DB_NAME:-glpi}
      MYSQL_USER: ${GLPI_DB_USER:-glpi}
      MYSQL_PASSWORD: ${GLPI_DB_PASSWORD:-glpi}
    volumes:
      - ./storage/mysql:/var/lib/mysql
    networks:
      - ia-hub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${GLPI_DB_USER:-glpi}", "-p${GLPI_DB_PASSWORD:-glpi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # GLPI (Gestionnaire Libre de Parc Informatique) — image officielle
  glpi:
    image: glpi/glpi:latest
    container_name: ia-hub-glpi
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "${GLPI_PORT:-8080}:80"
    volumes:
      - ./storage/glpi:/var/glpi:rw
      # Pour les plugins du marketplace (GLPI 10+), décommentez la ligne ci-dessous :
      # - ./storage/glpi_marketplace:/var/www/glpi/marketplace:rw
    networks:
      - ia-hub-network

