# =============================================================================
# IA Hub — Docker Compose pour Dokploy
# Usage : docker compose -f docker-compose.dokploy.yml up -d --build
# =============================================================================
# PostgreSQL avec pgvector + Application (backend + frontend)
# =============================================================================

services:

  # ── PostgreSQL avec pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_itsm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-erp_itsm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ia-hub-network

  # ── Application (backend Express + frontend React) ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_itsm}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      GLPI_URL: ${GLPI_URL:-}
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:-}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:-}
      FRONTEND_DIST_PATH: /app/erp-frontend/dist
    volumes:
      - app_uploads:/app/erp-backend/uploads
    ports:
      - "${PORT:-4000}:4000"
    networks:
      - ia-hub-network

networks:
  ia-hub-network:
    driver: bridge

volumes:
  postgres_data:
  app_uploads:
