services:

  # Base de données PostgreSQL avec pgvector
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_itsm
    volumes:
      - ../files/postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_itsm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dokploy-network

  # API Backend
  backend:
    build:
      context: ./erp-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://erp_user:erp_password@postgres:5432/erp_itsm?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: "*"
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      GLPI_URL: ${GLPI_URL:-}
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:-}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:-}
    volumes:
      - ../files/backend_uploads:/app/uploads
    networks:
      - dokploy-network

  # Frontend React (Nginx en prod)
  frontend:
    build:
      context: ./erp-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  backend_uploads:
